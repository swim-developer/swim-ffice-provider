# =============================================================================
# SWIM FF-ICE Provider - Configuration
# =============================================================================

quarkus.application.name=swim-ffice-provider
quarkus.application.version=1.0.0-SNAPSHOT

quarkus.naming.enable-jndi=true

# =============================================================================
# HTTP Server
# =============================================================================

quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=enabled

internal.server.port=${INTERNAL_SERVER_PORT:9080}

quarkus.http.auth.permission.public.paths=/q/*,/swagger-ui/*,/openapi
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.ping.paths=/swim/v1/subscriptions/ping
quarkus.http.auth.permission.ping.policy=permit

quarkus.http.auth.permission.cors-preflight.paths=/swim/*
quarkus.http.auth.permission.cors-preflight.policy=permit
quarkus.http.auth.permission.cors-preflight.methods=OPTIONS

quarkus.http.auth.permission.swim-api.paths=/swim/*
quarkus.http.auth.permission.swim-api.policy=authenticated

quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=SWIM FF-ICE Provider API
quarkus.swagger-ui.theme=flattop
quarkus.swagger-ui.doc-expansion=list

mp.openapi.servers=${OPENAPI_SERVERS}

# =============================================================================
# Security / OIDC / CORS
# =============================================================================

quarkus.oidc.enabled=${OIDC_ENABLED:true}
quarkus.oidc.application-type=service
quarkus.oidc.client-id=${OIDC_CLIENT_ID:swim-ffice-provider}
quarkus.oidc.token.issuer=any

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# =============================================================================
# Database (PostgreSQL)
# =============================================================================

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

# =============================================================================
# Messaging - Kafka Incoming (Event Ingress)
# =============================================================================

mp.messaging.incoming.ffice-events.connector=smallrye-kafka
mp.messaging.incoming.ffice-events.topic=${KAFKA_TOPIC:ffice-events-all-topic}
mp.messaging.incoming.ffice-events.group.id=${KAFKA_GROUP_ID:swim-ffice-provider}
mp.messaging.incoming.ffice-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ffice-events.auto.offset.reset=earliest
mp.messaging.incoming.ffice-events.bootstrap.servers=${kafka.bootstrap.servers}
mp.messaging.incoming.ffice-events.tracing-enabled=true
mp.messaging.incoming.ffice-events.commit-strategy=throttled
mp.messaging.incoming.ffice-events.failure-strategy=ignore

# =============================================================================
# Messaging - AMQP Outgoing (Event Publishing to Subscribers)
# =============================================================================

mp.messaging.outgoing.ffice-amqp-out.connector=smallrye-amqp
mp.messaging.outgoing.ffice-amqp-out.tracing-enabled=true
mp.messaging.outgoing.ffice-amqp-out.host=${amqp-host}
mp.messaging.outgoing.ffice-amqp-out.port=${amqp-port}
mp.messaging.outgoing.ffice-amqp-out.username=${amqp-username}
mp.messaging.outgoing.ffice-amqp-out.password=${amqp-password}
mp.messaging.outgoing.ffice-amqp-out.durable=true
mp.messaging.outgoing.ffice-amqp-out.health-enabled=true
mp.messaging.outgoing.ffice-amqp-out.connect-timeout=5000
mp.messaging.outgoing.ffice-amqp-out.reconnect-attempts=100
mp.messaging.outgoing.ffice-amqp-out.reconnect-interval=10
mp.messaging.outgoing.ffice-amqp-out.container-id=swim-ffice-provider

# =============================================================================
# SWIM Domain Configuration
# =============================================================================

swim.topics=${SWIM_TOPICS:FficeService}
swim.amq.role.suffix=-swim-ffice-v1-amq-role

swim.kubernetes.namespace=${KUBERNETES_NAMESPACE:swim-demo}

swim.provider.outbox.event-address=outbox.deliver
swim.provider.metric-prefix=ffice

swim.heartbeat.enabled=true
swim.heartbeat.interval=15s
swim.heartbeat.provider-id=${HOSTNAME:ffice-provider}

swim.subscription.expiry.check-interval=60s
swim.subscription.expiry.purge-interval=5m
swim.subscription.expiry.purge-delay=1h
swim.subscription.expiry.default-ttl=24h
swim.subscription.expiry.max-ttl=168h

# =============================================================================
# Observability
# =============================================================================

quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer".level=${LOG_LEVEL:INFO}
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n

quarkus.otel.enabled=${OTEL_ENABLED:true}
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}

quarkus.management.enabled=true
quarkus.micrometer.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${PROMETHEUS_ENABLED:true}

# =============================================================================
# Fault Tolerance
# =============================================================================

quarkus.fault-tolerance.enabled=true

# =============================================================================
# SSL/TLS
# =============================================================================

quarkus.ssl.native=true
